<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Stock Decision Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <header>
      <h1>📊 Smart Stock Decision Dashboard</h1>
      <div class="header-controls">
        <button id="theme-toggle" class="theme-btn">🌙</button>
        <div id="user-info"></div>
        <button onclick="logout()" class="btn btn-danger">Logout</button>
      </div>
    </header>

    <!-- Search, Filters, Stocks Grid, Chart Section - SAME AS BEFORE -->
    <div class="search-bar">
      <input id="search-input" type="text" placeholder="Enter stock symbol (AAPL, TSLA, MSFT)">
      <button onclick="searchStock()" class="btn btn-primary">Search</button>
    </div>

    <div class="filters">
      <div class="filter-group">
        <label>Price Range:</label>
        <input id="min-price" type="number" placeholder="Min Price">
        <span class="separator">-</span>
        <input id="max-price" type="number" placeholder="Max Price">
      </div>
      <select id="performance-filter" onchange="applyFilters()">
        <option value="all">All Performance</option>
        <option value="gain">Gainers 🟢</option>
        <option value="loss">Losers 🔴</option>
      </select>
      <button onclick="sortStocks('price')" class="btn btn-secondary">Sort by Price</button>
      <button onclick="sortStocks('change')" class="btn btn-secondary">Sort by % Change</button>
    </div>

    <div id="stocks-grid" class="stocks-grid"></div>

    <div id="chart-section" class="chart-section hidden">
      <h2 id="chart-symbol"></h2>
      <canvas id="price-chart" height="400"></canvas>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
